];

const MONTHS=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const MONTHS_SHORT=["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const DAYS_IT=["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
const PIE_COLS=[B.green,B.blue,B.fire,B.purple,B.amber,B.rose,B.muted];
const FB="'Josefin Sans',sans-serif";
const FO="'DM Sans',sans-serif";

function dim(y,m){return new Date(y,m+1,0).getDate();}
function dn(y,m,d){return DAYS_IT[new Date(y,m,d).getDay()];}
function isWE(y,m,d){const w=new Date(y,m,d).getDay();return w===0||w===6;}
function cs(v){
  if(!v)return{bg:"transparent",fg:B.dim};
  const n=parseFloat(v);
  if(!isNaN(n))return{bg:B.green,fg:"#ECF0E8"};
  const c=CODES.find(x=>x.code===v);
  return c?{bg:c.bg,fg:c.fg}:{bg:B.bg2,fg:B.muted};
}

function stats(data,emp,year,month){
  const days=dim(year,month);
  let ore=0,riposi=0,ferie=0,trasferta=0,malattia=0,permesso=0,congedo=0,off=0;
  for(let d=1;d<=days;d++){
    const v=data[`${year}-${month}-${emp}-${d}`]||"";
    if(!v||v==="RR")continue;
    const n=parseFloat(v);
    if(!isNaN(n))ore+=(n===1?8:n);
    else if(v==="R")riposi++;
    else if(v==="F")ferie+=8;
    else if(v==="B")trasferta++;
    else if(v==="M")malattia+=8;
    else if(v==="P")permesso+=8;
    else if(v==="C")congedo++;
    else if(v==="OFF")off++;
  }
  return{ore,riposi,ferie,trasferta,malattia,permesso,congedo,off};
}

function annStats(data,emp,year){
  let t={ore:0,riposi:0,ferie:0,trasferta:0,malattia:0,permesso:0,congedo:0,off:0};
  for(let m=0;m<12;m++){const s=stats(data,emp,year,m);for(const k of Object.keys(t))t[k]+=s[k];}
  return t;
}

function HL({color=B.border,style={}}){return <div style={{height:1,background:color,...style}}/>;}

// LocalStorage fallback (GitHub Pages - no window.storage)
const store = {
  async get(k){ try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch(e){return null;} },
  async set(k,v){ try{localStorage.setItem(k,v);}catch(e){} },
};

        <div onClick={e=>e.stopPropagation()} style={{background:B.bg1,border:`1px solid ${B.fire}50`,
          padding:24,maxWidth:320,width:"100%"}}>
          <div style={{color:B.fire,fontFamily:FB,fontWeight:200,fontSize:8,marginBottom:10,letterSpacing:4,textTransform:"uppercase"}}>Conferma Rimozione</div>
          <div style={{color:B.cream,fontFamily:FB,fontWeight:200,fontSize:12,marginBottom:8,letterSpacing:1.5,textTransform:"uppercase"}}>{confirmRm}</div>
          <div style={{color:B.muted,fontFamily:FO,fontSize:11,marginBottom:20,lineHeight:1.6}}>I dati verranno eliminati definitivamente.</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>rmEmp(confirmRm)} style={{flex:1,background:B.fire,border:"none",color:"#F0E8E6",cursor:"pointer",padding:11,fontFamily:FB,fontWeight:300,fontSize:8,letterSpacing:3,textTransform:"uppercase"}}>Rimuovi</button>
            <button onClick={()=>setConfirmRm(null)} style={{flex:1,background:B.bg2,border:`1px solid ${B.border}`,color:B.muted,cursor:"pointer",padding:11,fontFamily:FB,fontWeight:200,fontSize:8,letterSpacing:3,textTransform:"uppercase"}}>Annulla</button>
          </div>
        </div>
      </div>
    )}

    {/* TOAST */}
    {toast&&(
      <div style={{position:"fixed",bottom:"calc(16px + env(safe-area-inset-bottom))",left:"50%",transform:"translateX(-50%)",
        background:B.bg1,border:`1px solid ${B.border}`,color:B.sand,
        padding:"10px 18px",fontFamily:FB,fontWeight:200,whiteSpace:"nowrap",
        fontSize:9,letterSpacing:3,zIndex:200,boxShadow:"0 8px 30px rgba(0,0,0,0.8)"}}>
        ◈  {toast}
      </div>
    )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
